# ── Stack / heap ─────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y

# ── Disable unused network subsystems to keep binary small ───────────────────
CONFIG_NET_TCP=n
CONFIG_NET_STATISTICS=n
CONFIG_NET_LOG=n

# ── Floating point ────────────────────────────────────────────────────────────
CONFIG_FPU=y
