# ── Stack / heap ──────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192

# ── Floating point ────────────────────────────────────────────────────────────
# Needed explicitly for ESP32 and micro:bit; harmless for RA8D1.
CONFIG_FPU=y

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Board-specific configs (networking, BLE, I2C) live in boards/<board>.conf
# so each target only pulls in what its hardware supports.
