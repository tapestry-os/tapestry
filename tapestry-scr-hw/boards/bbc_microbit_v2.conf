# Board overlay for BBC micro:bit V2 (nRF52833 / Cortex-M4F)
# BLE swarm element with Cutebot Mini motor and LED output.
#
# No networking stack — gossip travels over BLE advertising instead.
# Telemetry is emitted as METRIC CSV lines over USB serial (115200 baud).
#
# The nRF52833 has a hardware FPU but Zephyr does not enable it by default.
# FPU_SHARING saves/restores FPU registers on context switches.

# ── Floating point ────────────────────────────────────────────────────────────
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="tapestry"
CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ── I2C (Cutebot) ─────────────────────────────────────────────────────────────
CONFIG_I2C=y
CONFIG_I2C_GPIO=y

# ── Element identity ──────────────────────────────────────────────────────────
# Override at build time with: -- -DCONFIG_TAPESTRY_ELEMENT_ID=N
CONFIG_TAPESTRY_ELEMENT_ID=0
