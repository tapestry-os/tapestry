# Board overlay for Renesas EK-RA8D1 (RA8D1 / Cortex-M85)
# Element 1 in the Phase 2 swarm.
#
# FPU is auto-enabled by the RA8D1 SoC Kconfig.
# The Ethernet driver (ETH_RENESAS_RA) is auto-enabled by the board DTS.

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=n
CONFIG_NET_STATISTICS=n
CONFIG_NET_LOG=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# ── Ethernet L2 ───────────────────────────────────────────────────────────────
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_ARP=y

# ── Element identity ──────────────────────────────────────────────────────────
CONFIG_TAPESTRY_ELEMENT_ID=1
