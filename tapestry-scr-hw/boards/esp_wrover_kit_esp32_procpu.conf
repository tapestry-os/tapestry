# Board overlay for ESP-WROVER-KIT (ESP32 / Xtensa LX6)
# Element 0 in the two-element Phase 2 swarm.

# ── ESP32 chip revision workaround ────────────────────────────────────────────
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# ── WiFi ──────────────────────────────────────────────────────────────────────
# WIFI_ESP32 (default y when WIFI=y) selects NET_L2_ETHERNET and
# NET_L2_WIFI_MGMT automatically; it also sets HEAP_MEM_POOL_ADD_SIZE_ESP_WIFI.
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI_INIT_PRIORITY=80

# ── Element identity ──────────────────────────────────────────────────────────
CONFIG_TAPESTRY_ELEMENT_ID=0

# WiFi credentials are NOT stored here — supply them via a gitignored file:
#
#   cp tapestry/tapestry-scr-hw/wifi.conf.example \
#      tapestry/tapestry-scr-hw/wifi.conf
#   # edit wifi.conf, then:
#   west build -b esp_wrover_kit/esp32/procpu \
#       --extra-conf tapestry/tapestry-scr-hw/wifi.conf \
#       tapestry/tapestry-scr-hw
