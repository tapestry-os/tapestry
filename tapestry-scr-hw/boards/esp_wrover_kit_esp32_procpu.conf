# Board overlay for ESP-WROVER-KIT (ESP32 / Xtensa LX6)
# Element 0 in the Phase 2 swarm.
#
# The ESP32 runs WiFi (UDP gossip to RA8D1) and BLE (gossip to micro:bit)
# simultaneously.  ESP32_SW_COEXIST_ENABLE enables the Espressif coexistence
# arbitration so both radios share the 2.4 GHz band without starving each other.

# ── ESP32 chip revision workaround ────────────────────────────────────────────
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# ── Networking (shared with RA8D1 overlay) ────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=n
CONFIG_NET_STATISTICS=n
CONFIG_NET_LOG=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# ── WiFi ──────────────────────────────────────────────────────────────────────
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI_INIT_PRIORITY=80

# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="tapestry-esp32"
CONFIG_BT_RX_STACK_SIZE=4096

# ── WiFi + BT coexistence ─────────────────────────────────────────────────────
CONFIG_ESP32_SW_COEXIST_ENABLE=y

# ── Element identity ──────────────────────────────────────────────────────────
CONFIG_TAPESTRY_ELEMENT_ID=0

# WiFi credentials are NOT stored here — supply them via a gitignored file:
#
#   cp tapestry/tapestry-scr-hw/wifi.conf.example \
#      tapestry/tapestry-scr-hw/wifi.conf
#   # edit wifi.conf, then:
#   west build -b esp_wrover_kit/esp32/procpu \
#       --extra-conf tapestry/tapestry-scr-hw/wifi.conf \
#       tapestry/tapestry-scr-hw
