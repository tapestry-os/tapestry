name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch so a fast-follow push
# doesn't queue behind a stale run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ztests:
    name: Zephyr unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Tapestry
        uses: actions/checkout@v4
        with:
          path: tapestry

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Sets up a west workspace at $GITHUB_WORKSPACE, installs the
      # Zephyr SDK, and exports ZEPHYR_BASE.  The app-path tells the
      # action where the west.yml manifest lives.
      - name: Set up Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: tapestry
          toolchains: x86_64-zephyr-elf

      # ── L4 CSM ──────────────────────────────────────────────────────────

      - name: Build L4 unit tests
        working-directory: ${{ github.workspace }}
        run: |
          west build -b native_sim/native/64 \
            --build-dir tapestry/tapestry-csm-sim/build/test-csm \
            tapestry/tapestry-csm-sim/tests

      - name: Run L4 unit tests
        working-directory: ${{ github.workspace }}
        run: ./tapestry/tapestry-csm-sim/build/test-csm/zephyr/zephyr.exe

      # ── L5 SCR ──────────────────────────────────────────────────────────

      - name: Build L5 unit tests
        working-directory: ${{ github.workspace }}
        run: |
          west build -b native_sim/native/64 \
            --build-dir tapestry/tapestry-scr-sim/build/test-scr \
            tapestry/tapestry-scr-sim/tests

      - name: Run L5 unit tests
        working-directory: ${{ github.workspace }}
        run: ./tapestry/tapestry-scr-sim/build/test-scr/zephyr/zephyr.exe

      # ── Simulation elements (compile-only) ──────────────────────────────
      # These are not run in CI (they require the Python orchestrator)
      # but we verify they compile to catch regressions early.

      - name: Build L4 simulation element
        working-directory: ${{ github.workspace }}
        run: |
          west build -b native_sim/native/64 \
            --build-dir tapestry/tapestry-csm-sim/build/element \
            tapestry/tapestry-csm-sim/zephyr/element

      - name: Build L5 simulation element
        working-directory: ${{ github.workspace }}
        run: |
          west build -b native_sim/native/64 \
            --build-dir tapestry/tapestry-scr-sim/build/element \
            tapestry/tapestry-scr-sim/zephyr/element

  # Compile the test suites for both Phase 1 hardware targets.
  # These builds are compile-only (no run): they verify that the pure C99
  # L4/L5 core compiles cleanly for Xtensa (ESP32) and Cortex-M85 (RA8D1).
  hw-build:
    name: Hardware target compile check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Tapestry
        uses: actions/checkout@v4
        with:
          path: tapestry

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: tapestry
          toolchains: xtensa-espressif_esp32_zephyr-elf:arm-zephyr-eabi

      # ── ESP-WROVER-KIT (ESP32 / Xtensa LX6) ────────────────────────────

      - name: Build L4 tests — esp_wrover_kit
        working-directory: ${{ github.workspace }}
        run: |
          west build -b esp_wrover_kit/esp32/procpu \
            --build-dir tapestry/tapestry-csm-sim/build/hw-esp-test-csm \
            tapestry/tapestry-csm-sim/tests

      - name: Build L5 tests — esp_wrover_kit
        working-directory: ${{ github.workspace }}
        run: |
          west build -b esp_wrover_kit/esp32/procpu \
            --build-dir tapestry/tapestry-scr-sim/build/hw-esp-test-scr \
            tapestry/tapestry-scr-sim/tests

      # ── Renesas EK-RA8D1 (RA8D1 / Cortex-M85) ──────────────────────────

      - name: Build L4 tests — ek_ra8d1
        working-directory: ${{ github.workspace }}
        run: |
          west build -b ek_ra8d1 \
            --build-dir tapestry/tapestry-csm-sim/build/hw-ra8d1-test-csm \
            tapestry/tapestry-csm-sim/tests

      - name: Build L5 tests — ek_ra8d1
        working-directory: ${{ github.workspace }}
        run: |
          west build -b ek_ra8d1 \
            --build-dir tapestry/tapestry-scr-sim/build/hw-ra8d1-test-scr \
            tapestry/tapestry-scr-sim/tests

      # ── BBC micro:bit V2 (nRF52833 / Cortex-M4F) ────────────────────────
      # Phase 1: verify that the pure C99 L4/L5 core compiles for nRF52833.

      - name: Build L4 tests — bbc_microbit_v2
        working-directory: ${{ github.workspace }}
        run: |
          west build -b bbc_microbit_v2 \
            --build-dir tapestry/tapestry-csm-sim/build/hw-mb-test-csm \
            tapestry/tapestry-csm-sim/tests

      - name: Build L5 tests — bbc_microbit_v2
        working-directory: ${{ github.workspace }}
        run: |
          west build -b bbc_microbit_v2 \
            --build-dir tapestry/tapestry-scr-sim/build/hw-mb-test-scr \
            tapestry/tapestry-scr-sim/tests

      # ── Phase 2 hardware element (tapestry-scr-hw) ──────────────────────
      # WiFi credentials are not needed for a compile-only check; a dummy
      # wifi.conf supplies the required Kconfig strings.
      # The ESP32 WiFi driver requires binary blobs from Espressif.

      - name: Fetch ESP32 WiFi blobs
        working-directory: ${{ github.workspace }}
        run: west blobs fetch hal_espressif

      - name: Build Phase 2 element — esp_wrover_kit
        working-directory: ${{ github.workspace }}
        run: |
          printf 'CONFIG_TAPESTRY_WIFI_SSID="ci"\nCONFIG_TAPESTRY_WIFI_PSK="ci"\n' \
            > /tmp/ci_wifi.conf
          west build -b esp_wrover_kit/esp32/procpu \
            --build-dir tapestry/tapestry-scr-hw/build/hw-esp \
            --extra-conf /tmp/ci_wifi.conf \
            tapestry/tapestry-scr-hw

      - name: Build Phase 2 element — ek_ra8d1
        working-directory: ${{ github.workspace }}
        run: |
          west build -b ek_ra8d1 \
            --build-dir tapestry/tapestry-scr-hw/build/hw-ra8d1 \
            tapestry/tapestry-scr-hw

      # ── BBC micro:bit V2 Phase 2 element ────────────────────────────────
      # BLE gossip transport + Cutebot motor driver, built from tapestry-scr-hw.

      - name: Build Phase 2 element — bbc_microbit_v2 (elem 0)
        working-directory: ${{ github.workspace }}
        run: |
          west build -b bbc_microbit_v2 \
            --build-dir tapestry/tapestry-scr-hw/build/hw-mb0 \
            tapestry/tapestry-scr-hw

      - name: Build Phase 2 element — bbc_microbit_v2 (elem 1)
        working-directory: ${{ github.workspace }}
        run: |
          west build -b bbc_microbit_v2 \
            --build-dir tapestry/tapestry-scr-hw/build/hw-mb1 \
            tapestry/tapestry-scr-hw \
            -- -DCONFIG_TAPESTRY_ELEMENT_ID=1
