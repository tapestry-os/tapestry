# ── Stack / heap ──────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192

# ── Hardware info (FICR device ID — used for auto element-ID assignment) ──────
CONFIG_HWINFO=y

# ── Floating point ────────────────────────────────────────────────────────────
CONFIG_FPU=y

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Board-specific configs (BLE, I2C) live in boards/bbc_microbit_v2.conf.
