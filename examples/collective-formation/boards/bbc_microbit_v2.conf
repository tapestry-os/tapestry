# Board overlay for BBC micro:bit V2 (nRF52833 / Cortex-M4F)
# BLE gossip transport + Cutebot Mini motor and LED output.

# ── Floating point ────────────────────────────────────────────────────────────
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="tapestry-collective-formation"
CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ── I2C (Cutebot) ─────────────────────────────────────────────────────────────
CONFIG_I2C=y
CONFIG_I2C_GPIO=y

# ── micro:bit LED matrix ───────────────────────────────────────────────────────
# MICROBIT_DISPLAY (mb_display_get / mb_display_image) depends on DISPLAY.
CONFIG_DISPLAY=y
CONFIG_MICROBIT_DISPLAY=y
