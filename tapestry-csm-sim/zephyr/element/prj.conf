# ── Stack / heap ─────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# ── Networking ────────────────────────────────────────────────────────────────
# Uses CONFIG_NET_NATIVE_OFFLOADED_SOCKETS so that Zephyr's BSD socket calls
# map directly to host OS socket calls.  No TAP interface or root required.
# Notes for Zephyr 4.x:
#   - NET_SOCKETS_POSIX_NAMES was removed; POSIX names are implicit with NET_SOCKETS.
#   - NET_NATIVE_OFFLOADED_SOCKETS depends on NET_DRIVERS — must be set explicitly.
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y

# ── Disable unused network subsystems to keep binary small ───────────────────
CONFIG_NET_TCP=n
CONFIG_NET_STATISTICS=n
CONFIG_NET_LOG=n

# ── Floating point ────────────────────────────────────────────────────────────
CONFIG_FPU=y
