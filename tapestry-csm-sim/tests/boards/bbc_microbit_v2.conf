# Board overlay for BBC micro:bit V2 (nRF52833 / Cortex-M4F)
#
# The nRF52833 has an FPU but Zephyr does not enable it by default for this
# board.  world_model.c uses sqrtf/fabsf, so explicit enablement is required.
# FPU_SHARING is needed because the Zephyr scheduler must save/restore FPU
# registers on context switches when more than one thread uses the FPU.
# Stack sizes match the ESP32 overlay: world_model_t structs on the stack.

CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_ZTEST_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
