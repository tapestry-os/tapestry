# Board overlay for ESP-WROVER-KIT (ESP32 procpu)
#
# The ESP32 SoC selects CPU_HAS_FPU but does not auto-enable the FPU
# coprocessor — world_model.c uses sqrtf/fabsf so we must enable it.
# Stack sizes are bumped from the 1 KiB ztest default: test functions
# allocate one or two world_model_t structs on the stack (~500 bytes
# each) so 1 KiB overflows; 4 KiB gives comfortable headroom.

CONFIG_FPU=y
CONFIG_ZTEST_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y
