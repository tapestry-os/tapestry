# Board overlay for Renesas EK-RA8D1 (Cortex-M85)
#
# The RA8D1 SoC Kconfig selects FPU automatically — no explicit
# CONFIG_FPU=y needed.  Stack sizes are bumped from the 1 KiB ztest
# default for the same reason as the ESP32 overlay: test functions
# allocate world_model_t structs on the stack.

CONFIG_ZTEST_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
